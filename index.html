<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Glory:ital,wght@0,100..800;1,100..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>CalorieCalc — Калькулятор калорий</title>
</head>
<body>
<div class="app-container">
    <div class="top-banner">
        <h1>Калькулятор калорий</h1>
    </div>

    <div class="dashboard">
        <div class="card">
            <div class="section-title">Калькулятор БЖУ</div>

            <div class="field">
                <label>Выберите продукт</label>
                <div class="custom-select">
                    <div class="select-trigger">
                        <span>Выберите продукт из списка</span>
                        <span class="select-arrow">▼</span>
                    </div>
                </div>
            </div>

            <div class="field">
                <label>Вес в граммах</label>
                <input type="number" class="weight-input" placeholder="Введите вес" value="150">
            </div>

            <button class="btn-primary">Рассчитать и добавить</button>
            <button class="btn-outline-custom">Добавить свой продукт</button>

            <div class="notification-success" style="display: none;">
                ✅ <span></span>
            </div>
        </div>

        <div class="card">
            <div class="section-title">Ручной ввод БЖУ</div>

            <div class="field">
                <label>Название продукта</label>
                <input type="text" class="text-input" placeholder="Например, куриная грудка" value="Куриная грудка">
            </div>

            <div class="row-bju">
                <div class="bju-field">
                    <label>Белки (г)</label>
                    <input type="number" class="bju-input" placeholder="0" value="24">
                </div>
                <div class="bju-field">
                    <label>Жиры (г)</label>
                    <input type="number" class="bju-input" placeholder="0" value="3.6">
                </div>
                <div class="bju-field">
                    <label>Углеводы (г)</label>
                    <input type="number" class="bju-input" placeholder="0" value="0">
                </div>
            </div>

            <div class="calories-preview">
                <span>Калории (на 100 г)</span>
                <span class="calories-number">555</span>
                <span>ккал</span>
            </div>

            <div class="field">
                <label>Вес в граммах</label>
                <input type="number" class="weight-input" placeholder="Вес порции" value="150">
            </div>

            <button class="btn-secondary">Добавить продукт</button>

            <div class="notification-success" style="display: none;">
                🍗 <span></span>
            </div>
        </div>
    </div>

    <div class="stats-section">
        <div class="stats-title">📊 Статистика за сегодня</div>
        <div class="stats-grid">
            <div class="stats-card">
                <div class="stats-label">🔥 Всего калорий</div>
                <div class="stats-value">0<span class="stats-unit">ккал</span></div>
            </div>
            <div class="stats-card">
                <div class="stats-label">🥩 Белки</div>
                <div class="stats-value">0<span class="stats-unit">г</span></div>
            </div>
            <div class="stats-card">
                <div class="stats-label">🧈 Жиры</div>
                <div class="stats-value">0<span class="stats-unit">г</span></div>
            </div>
            <div class="stats-card">
                <div class="stats-label">🍚 Углеводы</div>
                <div class="stats-value">0<span class="stats-unit">г</span></div>
            </div>
        </div>
        
        <div class="history-list">
            <div class="history-header">
                <span>Продукт</span>
                <span>Калории</span>
            </div>
            <div>
                <div class="empty-history">Пока ничего не добавлено. Добавьте продукты выше 👆</div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
